name: Katabump Auto Renew_B

on:
  schedule:
   - cron: '0 0 3-31/4 * *' # 每月3-31号，每4天8点(UTC 0:00)运行
  workflow_dispatch: # 允许手动触发

jobs:
  Renew-Katabump:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read
    
    steps:
    - uses: actions/checkout@v6
    - name: ⚙ 设置 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 🛠️ 安装系统依赖和python依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    - name: ⚙ 设置代理 (sing-box)
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

    - name: 🚀 运行续期脚本
      env:
        KATABUMP_EMAIL_B: ${{ secrets.KATABUMP_EMAIL_B }}
        KATABUMP_PASSWORD_B: ${{ secrets.KATABUMP_PASSWORD_B }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 app_B.py
        
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
